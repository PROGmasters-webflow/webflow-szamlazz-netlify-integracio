<!-- Webflow Embed Widget: Számlázz.hu Form MiniCRM pre-fill támogatással -->
<style>
  #szamlazz-form {
    font-family: inherit;
    width: 100%;
    max-width: 896px;
    margin: 0 auto;
    padding: 24px;
    box-sizing: border-box;
  }
  #szamlazz-form .form-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #szamlazz-form .form-section h3 {
    font-size: 20px;
    font-weight: 600;
    color: inherit;
    margin: 0 0 4px 0;
  }
  #szamlazz-form .form-divider {
    border: none;
    border-top: 1px solid #E5E7EB;
    margin: 24px 0;
  }
  #szamlazz-form .form-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media (min-width: 768px) {
    #szamlazz-form .form-row--2col {
      grid-template-columns: 1fr 1fr;
    }
  }
  #szamlazz-form .form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 0;
  }
  #szamlazz-form label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: inherit;
    margin-bottom: 6px;
  }
  #szamlazz-form label .req {
    color: #DC2626;
  }
  #szamlazz-form input {
    width: 100%;
    padding: 8px 16px;
    border: 1px solid #D1D5DB;
    border-radius: 8px;
    font-size: 15px;
    background: transparent;
    color: inherit;
    box-sizing: border-box;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #szamlazz-form input:focus {
    outline: none;
    border-color: #1A56DB;
    box-shadow: 0 0 0 2px rgba(26, 86, 219, 0.3);
  }
  /* AC-4: Read-only mezők vizuális megjelenése */
  #szamlazz-form input[readonly] {
    background-color: #F3F4F6;
    color: #6B7280;
    cursor: not-allowed;
  }
  #szamlazz-form input[readonly]:focus {
    border-color: #D1D5DB;
    box-shadow: none;
  }
  .input-error {
    border-color: #EF4444 !important;
  }
  .szamla-submit {
    width: 100%;
    padding: 12px 24px;
    background: #1A56DB;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    transition: background-color 0.2s, box-shadow 0.2s;
  }
  .szamla-submit:hover { background: rgba(26, 86, 219, 0.9); }
  .szamla-submit:focus {
    outline: none;
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px rgba(26, 86, 219, 0.3);
  }
  .szamla-submit:disabled { opacity: .6; cursor: not-allowed; }
  .szamla-msg {
    padding: 16px;
    border-radius: 8px;
    margin-top: 16px;
    display: none;
    font-size: 14px;
  }
  .szamla-success { background: #D1FAE5; color: #065F46; }
  .szamla-error   { background: #FEE2E2; color: #B91C1C; }

  /* AC-5: Összefoglaló blokk */
  #szamla-summary {
    display: none;
    background: rgb(236, 246, 248);
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #374151;
  }
  #szamla-summary h3 {
    margin: 0 0 12px 0;
    font-size: 15px;
    font-weight: 700;
    color: #111827;
  }
  #szamla-summary .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid #F3F4F6;
  }
  #szamla-summary .summary-row:last-child { border-bottom: none; }
  #szamla-summary .summary-label { color: #6B7280; }
  #szamla-summary .summary-value { font-weight: 600; color: #111827; }
  #szamla-summary .summary-total {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 2px solid #E5E7EB;
    font-size: 16px;
  }
</style>

<form id="szamlazz-form" novalidate>

  <!-- AC-5: Összefoglaló blokk a termék adatokról -->
  <div id="szamla-summary"></div>

  <!-- Section 1: Személyes adatok -->
  <div class="form-section">
    <h3>Személyes adatok</h3>

    <div class="form-row form-row--2col">
      <div class="form-group">
        <label>Vezetéknév <span class="req">*</span></label>
        <input name="vezeteknev" type="text" required>
      </div>
      <div class="form-group">
        <label>Keresztnév <span class="req">*</span></label>
        <input name="keresztnev" type="text" required>
      </div>
    </div>

    <div class="form-group">
      <label>E-mail cím <span class="req">*</span></label>
      <input name="email" type="email" required>
    </div>

    <div class="form-group">
      <label>Telefonszám</label>
      <input name="telefonszam" type="tel">
    </div>
  </div>

  <hr class="form-divider">

  <!-- Section 2: Céges adatok -->
  <div class="form-section">
    <h3>Céges adatok (opcionális)</h3>

    <div class="form-group">
      <label>Cég neve</label>
      <input name="cegnev" type="text">
    </div>

    <div class="form-row form-row--2col">
      <div class="form-group">
        <label>Adószám</label>
        <input name="adoszam" type="text">
      </div>
      <div class="form-group">
        <label>Bankszámlaszám (opcionális)</label>
        <input name="bankszamlaszam" type="text">
      </div>
    </div>
  </div>

  <hr class="form-divider">

  <!-- Section 3: Számlázási cím -->
  <div class="form-section">
    <h3>Számlázási cím</h3>

    <div class="form-group">
      <label>Ország <span class="req">*</span></label>
      <input name="orszag" type="text" value="Magyarország" required>
    </div>

    <div class="form-row form-row--3col">
      <div class="form-group">
        <label>Irányítószám <span class="req">*</span></label>
        <input name="irsz" type="text" required>
      </div>
      <div class="form-group">
        <label>Város <span class="req">*</span></label>
        <input name="telepules" type="text" required>
      </div>
      <div class="form-group">
        <label>Utca, házszám <span class="req">*</span></label>
        <input name="cim" type="text" required>
      </div>
    </div>
  </div>

  <!-- AC-3: Rejtett mezők – termék/számlázási adatok -->
  <input type="hidden" name="megnevezes">
  <input type="hidden" name="azonosito">
  <input type="hidden" name="mennyiseg">
  <input type="hidden" name="mennyisegiEgyseg">
  <input type="hidden" name="nettoEgysegar">
  <input type="hidden" name="afakulcs">
  <input type="hidden" name="nettoErtek">
  <input type="hidden" name="afaErtek">
  <input type="hidden" name="bruttoErtek">
  <input type="hidden" name="kedvezmeny">
  <input type="hidden" name="rendelesSzam">
  <input type="hidden" name="szamlaszamElotag">

  <p style="font-size:14px;color:#6B7280;margin:16px 0 0 0;line-height:1.5;">
    A díjbekérő generálását követően megjelenik a SZÁMLÁZZ.HU oldala, ahol letölthető a díjbekérő, ill. információk a fizetési lehetőségekről.
  </p>

  <button type="submit" class="szamla-submit">
    Díjbekérő generálása
  </button>

  <div class="szamla-msg szamla-success"></div>
  <div class="szamla-msg szamla-error"></div>

</form>
